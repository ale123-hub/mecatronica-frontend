<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h3>Registrar Proyecto Mecatrónico</h3>
        </div>
        <div class="card-body">
            <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Semestre</label>
                        <select formControlName="semester_id" class="form-select">
                            <option value="" disabled selected>Seleccione el semestre</option>
                            <option *ngFor="let s of semesters" [value]="s.id">
                                {{ s.name }}
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Turno</label>
                        <select formControlName="shift_id" class="form-select">
                            <option value="" disabled selected>Seleccione el turno</option>
                            <option *ngFor="let t of shifts" [value]="t.id">
                                {{ t.name }}
                            </option>
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Título</label>
                    <input type="text" formControlName="title" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Descripción</label>
                    <textarea formControlName="description" class="form-control"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Foto del Proyecto</label>
                    <input type="file" (change)="onFileSelected($event)" class="form-control" accept="image/*">

                    <div *ngIf="imagePreview" class="mt-3 text-center">
                        <p class="text-muted small">Vista previa:</p>
                        <img [src]="imagePreview" class="img-thumbnail" style="max-height: 200px;">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100" [disabled]="!projectForm.valid">
                    Guardar Proyecto
                </button>
            </form>
        </div>
    </div>
</div>
