<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center fw-bold fs-4" href="#">
      <i class="bi bi-gear-wide-connected me-2 text-primary"></i>
      <span class="text-white">Mecatrónica Proyectos</span>
    </a>

    <div class="ms-auto d-flex align-items-center">
      <span class="text-secondary me-3 d-none d-md-inline small">
        <i class="bi bi-person-circle me-1"></i> Admin
      </span>
      <button (click)="logout()" class="btn btn-outline-danger btn-sm rounded-pill px-4 transition-all">
        <i class="bi bi-box-arrow-right me-1"></i> Salir
      </button>
    </div>
  </div>
</nav>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      
      <div class="card shadow-lg border-0 overflow-hidden">
        <div class="card-header bg-primary py-3 text-center">
          <h5 class="mb-0 text-white text-uppercase fw-bold letter-spacing-1">
            <i class="bi bi-plus-circle me-2"></i>Nuevo Registro
          </h5>
        </div>

        <div class="card-body p-5 bg-white">
          <form [formGroup]="projectForm" (ngSubmit)="onSubmit()">
            
            <div class="row g-4"> <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary small text-uppercase">Semestre</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-calendar3"></i></span>
                  <select formControlName="semester_id" class="form-select border-start-0 ps-0 shadow-none">
                    <option value="" disabled>Seleccione...</option>
                    <option *ngFor="let s of semesters" [value]="s.id">{{ s.name }}</option>
                  </select>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary small text-uppercase">Turno</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0"><i class="bi bi-clock"></i></span>
                  <select formControlName="shift_id" class="form-select border-start-0 ps-0 shadow-none">
                    <option value="" disabled>Seleccione...</option>
                    <option *ngFor="let t of shifts" [value]="t.id">{{ t.name }}</option>
                  </select>
                </div>
              </div>

              <div class="col-12 mt-4">
                <label class="form-label fw-semibold text-secondary small text-uppercase">Título del Proyecto</label>
                <input type="text" formControlName="title" class="form-control form-control-lg shadow-none" placeholder="Ej: Celda de Manufactura Flexible">
              </div>

              <div class="col-12 mt-4">
                <label class="form-label fw-semibold text-secondary small text-uppercase">Descripción Técnica</label>
                <textarea formControlName="description" class="form-control shadow-none" rows="4" placeholder="Describe los componentes, PLC usado, sensores..."></textarea>
              </div>

              <div class="col-12 mt-4">
                <label class="form-label fw-semibold text-secondary small text-uppercase">Imagen del Prototipo</label>
                <div class="upload-container border-dashed p-4 text-center rounded bg-light cursor-pointer">
                    <input type="file" (change)="onFileSelected($event)" class="form-control d-none" id="fileUpload" accept="image/*">
                    <label for="fileUpload" class="mb-0 w-100 cursor-pointer">
                        <i class="bi bi-image text-primary fs-1"></i>
                        <p class="mb-0 text-muted mt-2">Haz clic para subir o arrastra la foto</p>
                    </label>
                </div>

                <div *ngIf="imagePreview" class="mt-4 position-relative animate__animated animate__zoomIn">
                  <img [src]="imagePreview" class="img-fluid rounded shadow-sm border" style="max-height: 250px; width: 100%; object-fit: cover;">
                </div>
              </div>

              <div class="col-12 mt-5">
                <button type="submit" [disabled]="projectForm.invalid" class="btn btn-primary btn-lg w-100 py-3 fw-bold shadow-sm transition-all hover-up">
                   <i class="bi bi-send-fill me-2"></i>PUBLICAR PROYECTO
                </button>
              </div>

            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
