<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-lg border-primary" style="width: 100%; max-width: 400px; border-radius: 15px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <h2 class="text-primary fw-bold">Admin Login</h2>
                <p class="text-muted small">Panel de Gestión - Mecatrónica</p>
            </div>

            <form (ngSubmit)="$event.preventDefault(); login()">
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" name="email" [(ngModel)]="credentials.email"
                        class="form-control rounded-pill border-primary" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Contraseña</label>
                    <input type="password" name="password" [(ngModel)]="credentials.password"
                        class="form-control rounded-pill border-primary" required>
                </div>

                <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm py-2">
                    Ingresar al Panel
                </button>
            </form>

            <div class="text-center mt-3">
                <a routerLink="/" class="text-decoration-none small text-muted">← Volver al inicio</a>
            </div>
        </div>
    </div>
</div>
