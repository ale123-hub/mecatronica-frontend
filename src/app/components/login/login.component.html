<div class="login-page-wrapper">
    <div class="bg-watermark"></div>

    <div class="login-box">
        <div class="robot-wrapper">
            <div class="speech-bubble" *ngIf="isGreeting">¡Hola, Admin! 👋</div>
            <img src="img/robot.png" alt="Robot" class="robot-img" [class.wave-animation]="isGreeting">
        </div>

        <div class="card shadow-lg border-0 login-card">
            <div class="top-accent-bar"></div>

            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold mb-1">Admin Login</h2>
                    <p class="text-muted small">Panel de Gestión - Mecatrónica</p>
                </div>

                <form (ngSubmit)="login()" #loginForm="ngForm" autocomplete="off">

                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary small">CORREO ELECTRÓNICO</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-primary">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <input type="email" name="user_email" [(ngModel)]="credentials.email" 
                                (focus)="startGreeting()"
                                class="form-control border-start-0 ps-0 shadow-none" 
                                placeholder="admin@mecatronica.com"
                                readonly onfocus="this.removeAttribute('readonly');"
                                autocomplete="none" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small">CONTRASEÑA</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-primary">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" name="user_password" [(ngModel)]="credentials.password"
                                (focus)="startGreeting()" 
                                class="form-control border-start-0 ps-0 shadow-none"
                                placeholder="••••••••" 
                                readonly onfocus="this.removeAttribute('readonly');"
                                autocomplete="new-password" required>
                        </div>
                    </div>

                    <button type="submit" [disabled]="loginForm.invalid"
                        class="btn btn-primary w-100 rounded-pill fw-bold shadow-sm py-2 text-uppercase">
                        Ingresar al Panel
                    </button>
                </form>

                <div class="text-center mt-4">
                    <a routerLink="/" class="text-secondary text-decoration-none small hover-link">
                        <i class="bi bi-arrow-left me-1"></i> Volver al inicio
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>
